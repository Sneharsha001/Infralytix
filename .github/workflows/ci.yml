# =============================================================================
# Infralytix — GitHub Actions CI Pipeline
# =============================================================================
# Triggers:
#   - Push to main or develop branches
#   - Pull Requests targeting main or develop
#
# Jobs:
#   1. lint-backend     — Ruff + MyPy
#   2. test-backend     — Pytest with coverage
#   3. lint-frontend    — ESLint + TypeScript check
#   4. build-frontend   — Vite production build
#   5. docker-build     — Validate Docker images build successfully
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Backend Linting
  # ---------------------------------------------------------------------------
  lint-backend:
    name: "Backend — Lint & Type Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: ./backend
        run: uv pip install --system -e ".[dev]"

      - name: Run Ruff (linter)
        working-directory: ./backend
        run: ruff check app/ tests/

      - name: Run Ruff (formatter check)
        working-directory: ./backend
        run: ruff format --check app/ tests/

      - name: Run MyPy (type checker)
        working-directory: ./backend
        run: mypy app/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Job 2: Backend Tests
  # ---------------------------------------------------------------------------
  test-backend:
    name: "Backend — Tests"
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: infralytix_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root --password=testroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      DEBUG: "true"
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: infralytix_test
      DB_USER: test_user
      DB_PASSWORD: testpassword
      SECRET_KEY: test-secret-key-not-for-production-use-only
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: ./backend
        run: uv pip install --system -e ".[dev]"

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -u root --password=testroot --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Run database migrations
        working-directory: ./backend
        run: alembic upgrade head

      - name: Run tests with coverage
        working-directory: ./backend
        run: |
          pytest tests/ \
            -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Job 3: Frontend Linting
  # ---------------------------------------------------------------------------
  lint-frontend:
    name: "Frontend — Lint & Type Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: TypeScript type check
        working-directory: ./frontend
        run: npm run type-check

  # ---------------------------------------------------------------------------
  # Job 4: Frontend Build
  # ---------------------------------------------------------------------------
  build-frontend:
    name: "Frontend — Production Build"
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build production bundle
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 5: Docker Build Validation
  # ---------------------------------------------------------------------------
  docker-build:
    name: "Docker — Validate Images"
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
