# =============================================================================
# Alembic Configuration — Infralytix
# =============================================================================
# Usage:
#   alembic upgrade head          # Apply all pending migrations
#   alembic downgrade -1          # Revert last migration
#   alembic revision --autogenerate -m "add users table"  # Generate migration
#   alembic history               # Show migration history
# =============================================================================

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template for new migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in migration file names
timezone = UTC

# Maximum number of characters for the slug (description) in file names
truncate_slug_length = 40

# Database URL — overridden by env.py which reads from Settings
# This is a placeholder; the real URL is loaded from environment variables
sqlalchemy.url = mysql+pymysql://%(DB_USER)s:%(DB_PASSWORD)s@%(DB_HOST)s:%(DB_PORT)s/%(DB_NAME)s

# =============================================================================
# Logging Configuration
# =============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
