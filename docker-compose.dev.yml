# =============================================================================
# Infralytix — Development Docker Compose Override
# =============================================================================
# This file EXTENDS docker-compose.yml for local development.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Or alias it in your shell:
#   alias dc-dev="docker compose -f docker-compose.yml -f docker-compose.dev.yml"
#   dc-dev up -d
#   dc-dev logs -f
# =============================================================================

name: infralytix

services:

  # ---------------------------------------------------------------------------
  # MySQL — Dev overrides
  # ---------------------------------------------------------------------------
  mysql:
    # Expose extra debug env in dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devroot}
      MYSQL_DATABASE: ${DB_NAME:-infralytix_db}
      MYSQL_USER: ${DB_USER:-infralytix_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-devpassword}
    # In dev, optionally add adminer for DB GUI
    # Remove this if you use TablePlus / DBeaver locally

  # ---------------------------------------------------------------------------
  # Backend — Hot reload via volume mount
  # ---------------------------------------------------------------------------
  backend:
    build:
      target: development      # Uses dev stage (with hot reload)
    environment:
      APP_ENV: development
      DEBUG: "true"
      LOG_FORMAT: text         # Human-readable logs in dev
      DB_HOST: mysql
    volumes:
      # Mount source code for hot reload
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/app",
        "--log-level",
        "debug",
      ]

  # ---------------------------------------------------------------------------
  # Frontend — Use host dev server (not Docker)
  # ---------------------------------------------------------------------------
  # In development, run the frontend OUTSIDE Docker for best hot reload:
  #   cd frontend && npm run dev
  #
  # The frontend service is disabled in dev to avoid port conflicts.
  frontend:
    profiles:
      - frontend-docker    # Only starts when: docker compose --profile frontend-docker up

  # ---------------------------------------------------------------------------
  # Adminer — Database GUI (dev only)
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:4
    container_name: infralytix_adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: dracula
    depends_on:
      - mysql
    networks:
      - infralytix_network
    restart: unless-stopped
    profiles:
      - tools              # Start with: docker compose --profile tools up
