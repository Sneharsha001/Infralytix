# =============================================================================
# Infralytix — Production Docker Compose
# =============================================================================
# Usage:
#   docker compose --env-file .env up -d
#   docker compose --env-file .env down
#   docker compose --env-file .env logs -f backend
# =============================================================================

name: infralytix

services:

  # ---------------------------------------------------------------------------
  # MySQL 8.4 — Primary Database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: infralytix_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      # Performance tuning for development
      MYSQL_INNODB_BUFFER_POOL_SIZE: 256M
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u",
          "root",
          "--password=${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - infralytix_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Backend — FastAPI (Python 3.12)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: infralytix_backend
    env_file:
      - .env
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - infralytix_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Frontend — React + Vite served via Nginx
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: infralytix_frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - infralytix_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  mysql_data:
    name: infralytix_mysql_data
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  infralytix_network:
    name: infralytix_network
    driver: bridge
