<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── SEO ───────────────────────────────────────────────────────────── -->
    <title>Infralytix — AI-Powered Developer Infrastructure OS</title>
    <meta
      name="description"
      content="Infralytix is an AI-powered platform that helps developers analyze repositories, generate Dockerfiles, create CI/CD pipelines, audit security, and estimate cloud costs."
    />
    <meta name="keywords" content="infrastructure, AI, DevOps, Docker, Kubernetes, CI/CD, cloud" />
    <meta name="author" content="Sneha Harsha" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph ────────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Infralytix — AI-Powered Developer Infrastructure OS" />
    <meta
      property="og:description"
      content="Analyze repos, generate Docker files, audit security, and estimate cloud costs with AI agents."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- ── Fonts (Google Fonts) ──────────────────────────────────────────── -->
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter: UI text | JetBrains Mono: code and terminal output -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ── Theme Color ────────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#0f0f23" />
    <meta name="color-scheme" content="dark light" />
  </head>
  <body class="bg-neutral-900 text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx></script>
  </body>
</html>
