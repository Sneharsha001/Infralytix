# =============================================================================
# Infralytix Frontend — Nginx Configuration
# =============================================================================
# This config:
#   - Serves the Vite build (index.html + static assets)
#   - Proxies /api calls to the backend container
#   - Enables gzip compression
#   - Sets security headers
#   - Handles React Router's client-side routing (SPA fallback)
# =============================================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Character set ──────────────────────────────────────────────────────────
    charset utf-8;

    # ── Security Headers ───────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "DENY"           always;
    add_header X-XSS-Protection          "1; mode=block"  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip Compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        application/javascript
        application/json
        application/xml
        font/truetype
        font/opentype
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── Static Assets — Long Cache ─────────────────────────────────────────────
    # Vite generates hashed filenames (e.g., main.abc123.js)
    # so these can be cached for 1 year safely
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API Proxy ──────────────────────────────────────────────────────────────
    # Forward /api/* requests to the backend service
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ── SPA Fallback ───────────────────────────────────────────────────────────
    # For React Router — any non-file path serves index.html
    # React Router handles the actual routing client-side
    location / {
        try_files $uri $uri/ /index.html;

        # No caching for index.html — always fetch fresh
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Error Pages ────────────────────────────────────────────────────────────
    error_page 404 /index.html;  # Let React Router handle 404s

    # ── Logging ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;
}
